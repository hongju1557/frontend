<head>

        #지원동기 {
            width: 500px;

        </style>
</head>
<body>
    <H1>프런트엔드 개발자 지원서</H1> <br>
    HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.
    <br>
    <br>
    <hr>
    <br>
    
    <form action="/jiwon.html" target="_blank">
        <legend><h3>개인정보</h3></legend>
        
        <ul>
        
            <li> 
                <label> 
                이름 <input type="text" value="" placeholder="공백없이 입력하세요" id="name" required> 
                </label>
            </li>
            <li> <label>연락처 <input type="text" value="" name="" id="phone" required>
            </label>
         </li>

        </ul>
        <br>
        <legend><h3>지원분야</h3></legend>
        <ul>
            <li> <input type="radio" name="지원분야" value="1" id="" required>웹 퍼블리싱</li><br>
            <li> <input type="radio" name="지원분야" value="2" id="">웹 애플리케이션 개발</li><br>
            <li> <input type="radio" name="지원분야" value="3" id="">개발 환경 개선</li><br>

        </ul>
        <br>
        <legend><h3>지원동기</h3></legend>
        <input type="text" name="" id="지원동기" placeholder="본사 지원 동기를 간략히 써 주세요.">

        <input type="submit" value="접수하기"> <input type="reset" value="다시 쓰기">
    </form>

    
</body>
