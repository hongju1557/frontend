<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container{
            /* 축을 기준으로 배치 */
            border: 1px solid black;
            display: flex;
            /* flex-direction: column-reverse; */
            /* 주축의 정렬 */
            justify-content: space-around;/
            /* 교차축의 정렬 */
            align-items: center;
            /* 요소를 여러 줄에 표현 */
            /* 플렉스 박스의 기본 값은 한 줄에 모두 표현하는 것 */
            flex-flow: wrap;
            /* background-color: white; */
            /* width: 100px; */
            /* height: 100px; */
        }
        .box{
            border: 1px solid blue;
           width: 400px;
           height: 200px;
           display: flex;

        }
        .box_img{
            width: 30%;
            height: 100%;
            text-align: center;
            line-height: 100%;
            background-color: #333;

        }
        .box_text{
            width: 70%;
            height: 100%;
            background-color: yellow;
        }
        .box_img img{
            width: 80%;
          
            border-radius: 25%;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
          <div class="box_img"> <img src="img/tangerines.jpg" alt="" ></div>
          <div class="box_text">
            <p></p>
            <p></p>
          </div>
        </div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>

    </div>
    
</body>
</html>
