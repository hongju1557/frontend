<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0px;
        }
        header{
            width: 100%;
            height: 200px;
            background-color: gray;
        }
        main {
            width: 100%;
            /* vh : 창의 높이, vw : 창의 너비 */
            height: 70vh;
            background-color: red;

        }
        footer{
            width: 100%;
            height: 200px;
            background-color: aqua;
        }
        .container{
            width: 80%;
            margin: 0 auto;
        }
        .banner{
            text-align: center;
            line-height: 60px;
            height: 60px;
            background-color: azure;
            color: blue;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .flexbox{
            display: flex;
            justify-content: end;
        }
        .top_quickmenu{
            width: 100%;
        }
        li img {
            width: 16px;
            height: 20px;
        }
        a img {
            width: 16px;
            height: 20px;
        }
        ul {
            list-style: none;
        }
        a {
            text-decoration: none;
            color: blue;

        }
        .top_quickmenu a {
            padding: 0 20px;
            display: flex;
            justify-content: end;
        }
        .logo_item {
            text-align: right;

        }
        .logo_item i {
            padding: 20px;
        }
        .logo {
            height: 200px;
            background: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFpKWxzFYweoJ3EIEij_jccSwOXUgdzYu0_Yle2pedhQ&s=10)
        }

    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 : 로고 퀵메뉴 메뉴 -->
        <header>
            <div class="banner">🕎당일 배송</div>
            <div class="top_quickmenu">
                <a href="">로그인</a>
                <a href="">회원가입</a>
                <a href="">마이샵</a>
                <a href="">커뮤니티</a>
                <a href=""><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFpKWxzFYweoJ3EIEij_jccSwOXUgdzYu0_Yle2pedhQ&s=10" alt="">KR</a>
            </div>
            <div class="top_quickmenu"> 
                <ul class="flexbox">
                    <li class="quickmenuitem">로그인</li>
                    <li class="quickmenuitem">회원가입</li>
                    <li class="quickmenuitem">마이샵</li>
                    <li class="quickmenuitem">커뮤니티</li>
                    <li class="quickmenuitem"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFpKWxzFYweoJ3EIEij_jccSwOXUgdzYu0_Yle2pedhQ&s=10" alt="">KR
                    </li>

                </ul>

            </div>
            <div class="logo">
                <div class="logo_item">
                    <i class="bi bi-gender-male"></i>
                    <i class="bi bi-steam"></i>
                    <i class="bi bi-twitter"></i>

                </div>
            </div>
            
        </header>
        <!-- 메인 : 서비스 되는 컨텐츠 -->
        <main></main>
        <!-- 푸터 : -->
        <footer></footer>

    </div>
</body>
</html>
