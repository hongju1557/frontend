    <h1>배열<h1>
    
        
        <script>
            
            //배열 선언 [ ]
            //배열 : 여러개의 데이터를 하나의 변수에 저장
            //선언 : []를 이용해서 여러개의 값을 나열
            //배열의변수명[방번호]
            
           const titles = ["도시의 밤", "파랑의 계절", "스텔라 오디세이"];
            for (let i=0; i<titles.length; i++){
                //배열의 방의 데이터 읽어오기
                console.log(titles[i])
                // 반복문 안에 있는 데이터의 값을 출력 하기 위해서 반복문을 이용
            }
            
            //배열의 방의 값을 변경하기
            titles[2] = "타짜";
            //변경된 값 확인
            console.log(titles);
            
            //없는 번호를 입력하면 undefined
            console.log(titles[4]);
            
            
            
            //new array()를 사용해서 배열을 만드는 방법
            const arr1 = new Array(1,2,3);
            console.log(arr1);
            
        </script>

    <h2>함수</h2>
    <script>
        /*
        매개변수 : 외부에서 함수를 호출할 때 넣어주는 값(필수아님)
        반환 : 호출한 곳으로 값을 되돌려 보냄(필수아님)

        함수 작성 방법
        function 함수이름 (매겨변수1,매개변수2,...){
            return 반환할 값(리턴할 값)
        }

        함수 실행 방법
            함수명();
            함수명(값,값);
        */

        function print(){
            console.log('print');
        }
        //화살표 함수로 변환
        let arrow_print = ()=> console.log('print')
        arrow_print ();
        

       //매개변수는 있고 반환(return)이 없는 함수
       //함수의 실행 결과 undefined가 반환됨
       function print(){
        console.log('print');
       }
        function print1(msg){
        console.log(msg);
       }

       //두 개의 수를 입력 받아서 두 수의 합을 반환하는 함수
       function add(i,j){
        return i + j ;
       }

       //익명의 함수를 변수에 저장
       let arrow_print1 = msg => console.log(msg);

       let arrow_add = (i,j)=>i+j;


       //배열메서드 - 배열자체를 변경, 반환만 하는 경우
       // 함수의 실행결과 반환 값을 변수에 저장했다가 다시 사용
       add (4,8); //호출만 하는 것은 의미x - 반환값이 있고 반환값을 재사용해야 한다면 변수에 저장
       let res = add (1557,88848);
       console.log(res);

       /*
       익명의 함수
       함수를 변수에 저장하거나 함수를 매개변수로 전달할 수 있다
       콜백함수 - 함수를 매개변수로 전달
       */

       //익명의 함수를 변수에 저장
       let greet = function (name){
        console.log(`${name}님 반가워요`);
       }

       //변수에 저장된 익명의 함수를 실행하는 방법
       //변수의 이름을 불러줌()
       greet();
       greet("날두");

       //2개의 수를 입력 받아서 두 수의 합을 반환하는 함수
       //타입을 확인해서 숫자가 아니라면 "숫자를 입력해주세요"라고 반환
       // 함수명 add2 
       function add2(num1,num2){
        // 논리연산자
        // && : 두 개 다 참이면 싱행 
        // || : 둘 중 하나만 참이여도 실행
        //  != : 같지 않음
        if(typeof (num1) != 'number' || typeof (num2) != 'number') {
            return "숫자를 입력해주세요"
        }
        else {
            return num1+num2;
        }
       }
