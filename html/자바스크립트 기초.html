    <h1>자바스크립트</h1>

    <!-- 위치 중요
     스크립트가 실행되기 전에 화면에 요소가 그려져야 요소를 선택할 수 있음 -->
    <script>
        // 한줄 주석
        /*여러 줄 주석
        줄
        */
       //콘솔창에 출력 ->개발자 도구 콘솔창에 내용이 출력됨
       console.log("안내", "콘솔창에 출력")

       //화면에 있는 요소를 선택하는 방법
        //document.querySelector("선택자")
        console.log("body 태그 상단", document.querySelector("h1")) 

        // 스트립트 실행 순서가 중요한 이유 / 변수선언 / 변수에 값을 할당 / 타입확인 / + 연산자의 특징
        //타입확인 / 형변환
        // 변수명 = 값
        // 변수의 타입은 리터링에 의해서 결정된다
        //지정된 값에 따라서 타입이 결정되는 언어
        // 변수 사용 : 변수 이름을 불러주기
        // let, const, var
        //var : 함수단위의 유효 범위, 재선언 가능 - 위험 , 재할당 가능
        
        var a=1; var b=2; var a=3;
        //블록 {}단위의 스코프, 재선언 불가능, 재할당 가능
        let c=1; c=2; 
        //let c=100; <-- 재선언 불가능
        const d=1;
        // d=2; 재할당 불가능

        //타입을 확인하는 방법
        typeof(a)
        typeof("123")
        //문자열인 경우 "". '' 안에 작성해야 오류 발생 하지 않음

        //키워드 없이 변수를 만들면 전역 변수(어디서나 사용 가능)
        e="전역변수"

        // 자료형 = 리터럴에 의해서 결정된다
        // 문자열, 숫자, boolean, function, object, 
        //boolean : 참(true) , 거짓(false) 을 나타냄 
        //주로 비교연산자에 의해 나온값(결과)
        // ==, >=, <=, !=
        // === <- 타입까지 비교 할 때
        //name이라는 변수에 이름을 저장하고 콘솔창에 출력
        let name = "이름"

        //화면에 있는 요소를 변수에 저장
        let h1 = document.querySelector("h1")
        // innertext : 요소의 시작태그와 끝태그 사이의 컨텐츠를 변경
        h1.innerText = name

        //제어문 (if/switch) /반복문 (for/while/do-while)
        //while - 조건을 체크하고 실행, do-while - 일단 실행하고 조건을 체크
        /*
        제어문 : 조건에 따라 코드블럭{}을 실행
        조건식의 결과는 boolean 타입이므로 조건문 안에 boolean(true,false) 타입의 값을 작성 가능
        if(조건문){
        조건이 참이면 실행
        }

        if(조건문){
        조건이 참이면 실행
        } else {
         조건이 거짓이면 실행
        }

        if(조건문){
        조건이 참이면 실행
        } else if(조건문){
         조건이 참이면 실행
        } else {
        조건이 거짓이면 실행 
        }
        */

        if(true){
            console.log("조건문이 참이면 실행")
        }

        if(1==2){
            console.log("조건문이 참이면 실행")
        }

        // 9.0 이상이면 명작
        // 7.0 볼만함
        // 그 외 비추
        let rating = 7.3;

        if(rating>=9.0){
            console.log("명작")
        } else if(rating>=7.0){
            console.log("볼만함")
        } else {console.log("비추")}


        //prompt(매개변수, 파라메터)
        //prompt : 웹 브라우저로 부터 사용자의 입력을 받아 올때 사용
        //사용자의 입력값을 반환
        //반환값을 변수에 저장
        let kor = 70; // prompt('국어시험 점수');
        let eng = 45;
        let avg = (kor+eng)/2
        console.log(kor);
        /* 
        1. 점수를 학점으로 변환해서 출력
        >= 90 A 
        >= 80 B
        >= 70 C
        >= 60 D
        */

       if(kor>=90){console.log("A학점 입니다")}
       else if(kor>=80){console.log("B학점 입니다")}
       else if(kor>=70){console.log("C학점 입니다")}
       else if(kor>=60){console.log("D학점 입니다")}
       else{console.log("F학점 입니다")}

        /*
        2.조건을 여러개 주는 방법 
        논리연산자 : 주어진 조건들의 참과 거짓을 판별
        && 그리고
        || 또는
        ! 부정 연산자
        평균을 구해서 합격/불합격
        과목별 40 이하는 과락,불합격
        영어시험, 국어시험의 점수를 받고 평균이 80 이상이면 합격
        */
       if( kor> 40 && eng >40 && avg>=80){
        //변수 출력 방법 `백팃 안에 문자열과 변수를 함께 작성 할 수 있다
        console.log (`${avg} 합격입니다.`);
       } else {console.log (`${avg} 불합격입니다.`)}

       /*
       3.삼항 연산자
       조건 ? 참일떄 반환값 : 거짓일때 반환값
       */

       let res = (kor >= 90) ? "합격" : "불합격";
       console.log(`점수는 ${kor} ${res}입니다.`)

       /*
       falsy한 값
       조건문에서 데이터가 유효한지 검사할때 사용
       js 조건문에서 false로 평가 받는 값
       false, 0, "", null, undefined, NaN 
       */

       if(kor){
        console.log("falsy하지 않은 값은 true로 처리")

       }

       /* 
       반복문
       for(초기식; 조건식; 증감식;){
       
       }
       초기식 - 변수초기화(처음 한 번 실행)
       조건이 참이면 코드블럭이 실행
       증감식으로 변수의 값을 증감 또는 감소
       조건이 참이면 코드블럭 실행

       조건이 참이 아니면 반복문 종료(코드블럭 탈출)

       1부터 10까지 1씩 증가하면서 값을 출력
       */
      console.log("--- 반복문 ---")
      for(let i=1; i<=10; i++){ //i+=2 2씩 증가, 숫자에 따라 증가
        //홀수 짝수 판별
        if(i%2 == 0 ){
            console.log (i)
        }
    }

    let dan = 2;
    //1~9
    console.log ("---2단 출력---")
    for(let i=1; i<10; i++){
        //2*i
        console.log (`${dan}*${i} =${dan*i}`)
    }

    //구구단 출력하기
    console.log ("2단부터 9단까지 출력")
    //이중포문을 이용해서 2단부터 9단까지 출력하기

    //break - 반복문 탈출
    //continue - 현재 문장만 건너뛰기
    // 아래 코드를 실행하지 않고 증감식으로 넘어감
    for(dan=2; dan<10; dan++){
        // if (dan > 3){
        //     break;
        //     //반복문 종료
        // }

        if(dan % 2 == 0) {
            continue;
        }
        
        
        //dan은 2부터 9까지 출력


        console.log(dan+"단")
        for(let i=1; i<10; i++){
            console.log(i*dan);
        }
    }

    /*
    조건이 참이면 코드블럭을 실행
    while(조건){
    
    }
    */
    console.log('while문을 사용해서 1부터 10까지 출력해보기')

    let num = 1;
    while(num <=10 ){
        console.log(num);

        //1씩 증가시키는 방법
        num = num +1 ;
        // num += 1;
        // num++;
    }

    while(true){

        if(num>10){
            break;
        }
    }

        </script>
