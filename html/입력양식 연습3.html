<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redhyang jumun</title>
</head>
<body>
    <h1>레드향 주문하기</h1>
    <form action="/jumun.html" target="_blank">
        <fieldset>
            <legend>상품 선택</legend>
            <h4>주문할 상품을 선택해 주세요.</h4>
            <ul>
                <li> <input type="checkbox" name="" id="" value="1"> 선물용 3kg <input type="number" name="" id="" min="0" max="5"> 개 <br> </li>
                <li> <input type="checkbox" name="" id="" value="2"> 선물용 5kg <input type="number" name="" id="" min="0" max="3"> 개 <br> </li>
                <li> <input type="checkbox" name="" id="" value="3"> 가정용 3kg <input type="number" name="" id="" min="0" max="5"> 개 <br> </li>
                <li> <input type="checkbox" name="" id="" value="4"> 가정용 5kg <input type="number" name="" id="" min="0" max="3"> 개 <br> </li>

            </ul>
            <legend>포장 선택</legend>
            <ul>
                <li> <input type="radio" name="sunmulpojang" value="1" id=""> 선물 포장</li>
                <li> <input type="radio" name="sunmulpojang" value="2" id=""> 선물 포장 안 함</li>
                
            </ul>


        </fieldset>
        <fieldset>
            <ul>
                <li>이름<input type="text" name="" id=""></li><br>
                <li>배송 주소<input type="text" name="" id=""></li><br>
                <li>이메일 <input type="email" name="" id=""></li><br>
                <li>연락처 <input type="text" name="" id=""></li><br>
                <li>배송 지정 <input type="date" name="" id=""> (주문일로부터 최소 3일 이후) </li><br>
                <li>메모 <input type="text" name="" id="" style="width: 500px; height: 200px;"></li><br>

            </ul>

        </fieldset>
        <input type="submit" value="주문하기"> <input type="reset" value="취소하기">


    </form>
</body>
</html>
